<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>购物车 - Demo Shop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <strong>Demo Shop</strong>
    <nav>
      <a href="{{ url_for('index') }}">首页</a>
      <a href="{{ url_for('cart_view') }}">购物车 <span class="badge" data-testid="cart-badge-count">{{ cart_count }}</span></a>
    </nav>
  </header>
  <main data-testid="cart-page">
    <h1>购物车</h1>
    {% if not items %}
    <div class="card" data-testid="empty-cart-msg">购物车是空的</div>
    {% else %}
    <div class="card">
      <table>
        <thead><tr><th>商品</th><th>单价</th><th>数量</th><th>小计</th><th>操作</th></tr></thead>
        <tbody>
        {% for item in items %}
        <tr data-testid="cart-item-{{ item.sku_id }}">
          <td data-testid="cart-item-name">{{ item.name }}</td>
          <td data-testid="cart-item-price">¥{{ '%.2f'|format(item.price) }}</td>
          <td>
            <form method="post" action="{{ url_for('cart_update') }}">
              <input type="hidden" name="sku_id" value="{{ item.sku_id }}">
              <input type="number" name="quantity" value="{{ item.quantity }}" min="0" data-testid="cart-item-qty-{{ item.sku_id }}">
              <button type="submit" class="btn btn-secondary" data-testid="cart-item-update-{{ item.sku_id }}">更新</button>
            </form>
          </td>
          <td data-testid="cart-item-line-total">¥{{ '%.2f'|format(item.line_total) }}</td>
          <td>
            <form method="post" action="{{ url_for('cart_update') }}">
              <input type="hidden" name="sku_id" value="{{ item.sku_id }}">
              <input type="hidden" name="quantity" value="0">
              <button type="submit" class="btn btn-danger" data-testid="cart-item-delete-{{ item.sku_id }}">删除</button>
            </form>
          </td>
        </tr>
        {% endfor %}
        </tbody>
      </table>
      <p><strong data-testid="cart-total">合计：¥{{ '%.2f'|format(cart_total) }}</strong></p>
      <a class="btn" href="{{ url_for('checkout') }}" data-testid="checkout-btn">去结算</a>
    </div>
    {% endif %}
  </main>
</body>
</html>
