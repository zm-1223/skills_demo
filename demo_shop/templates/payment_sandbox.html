<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>支付沙箱 - Demo Shop</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main data-testid="payment-sandbox-page">
    <div class="card">
      <h1>第三方支付沙箱</h1>
      <p>订单号：<span data-testid="sandbox-order-id">{{ order_id }}</span></p>
      <p>支付金额：<strong data-testid="sandbox-amount">¥{{ '%.2f'|format(amount) }}</strong></p>
      <p>请在下方模拟真实支付结果（非 mock 接口，为沙箱页面操作）。</p>
      <form method="post" action="{{ url_for('payment_confirm', order_id=order_id) }}">
        <button type="submit" name="action" value="success" class="btn" data-testid="pay-confirm-btn">确认支付成功</button>
        <button type="submit" name="action" value="cancel" class="btn btn-danger" data-testid="pay-cancel-btn">取消支付</button>
      </form>
    </div>
  </main>
</body>
</html>
