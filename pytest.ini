[pytest]
testpaths = tests/e2e tests/api
pythonpath = .
addopts = -v --alluredir=reports/allure-results --clean-alluredir
markers =
    ui: UI/E2E 测试（Selenium）
    api: 接口测试（requests）
    flaky: 偶发不稳定 UI 用例，配合 pytest-rerunfailures 重试
    cart: 购物车相关用例
    checkout: 结算相关用例
    payment: 支付相关用例
    login: 登录相关用例
log_cli = true
log_cli_level = INFO
